---
layout: default
title: Community
---

<div class="container">
    <h1>Community</h1>

    <div class="card">
        <h3>Players Leaderboard</h3>
        <div id="leaderboardContainer">
            <table class="table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Rating</th>
                        <th>Games</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td colspan="4" class="text-center">Loading players...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    let db;
    let getDocs, collection;

    // Wait for Firebase to be initialized
    async function waitForFirebase() {
        let attempts = 0;
        while (!window.db && attempts < 100) {
            await new Promise(resolve => setTimeout(resolve, 50));
            attempts++;
        }

        if (!window.db) {
            console.error("Firebase failed to initialize");
            document.getElementById("leaderboardBody").innerHTML =
                '<tr><td colspan="4" class="text-center text-danger">Firebase not initialized</td></tr>';
            return;
        }

        try {
            const firestoreModule = await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js");

            getDocs = firestoreModule.getDocs;
            collection = firestoreModule.collection;
            db = window.db;

            console.log("Firebase initialized, loading leaderboard...");
            loadLeaderboard();
        } catch (error) {
            console.error("Error loading Firebase modules:", error);
            document.getElementById("leaderboardBody").innerHTML =
                '<tr><td colspan="4" class="text-center text-danger">Error loading Firebase</td></tr>';
        }
    }

    async function loadLeaderboard() {
        try {
            console.log("Fetching users from Firestore...");
            const tbody = document.getElementById("leaderboardBody");

            // Fetch all users (without orderBy to avoid index issues)
            const snapshot = await getDocs(collection(db, "users"));

            console.log("Query result - empty:", snapshot.empty, "docs count:", snapshot.size);

            tbody.innerHTML = "";

            if (snapshot.empty) {
                console.warn("No users found in Firestore");
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">No players yet</td></tr>';
                return;
            }

            // Convert to array and sort by rating
            const players = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                console.log("User doc:", doc.id, data);
                players.push({
                    uid: doc.id,
                    nickname: data.nickname || "Unknown",
                    rating: data.rating || 1200,
                    games: data.games || 0
                });
            });

            // Sort by rating descending
            players.sort((a, b) => b.rating - a.rating);
            console.log("Sorted players:", players);

            // Display top 20
            let rank = 1;
            players.slice(0, 20).forEach(player => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${rank}</td>
                    <td><a href="/drychess/profile.html?uid=${player.uid}" style="color: var(--pumpkin); text-decoration: none;">${player.nickname}</a></td>
                    <td><strong>${player.rating}</strong></td>
                    <td>${player.games}</td>
                `;
                tbody.appendChild(row);
                rank++;
            });
        } catch (err) {
            console.error("Error loading leaderboard:", err);
            console.error("Error code:", err.code);
            console.error("Error message:", err.message);
            document.getElementById("leaderboardBody").innerHTML =
                '<tr><td colspan="4" class="text-center text-danger">Error: ' + err.message + '</td></tr>';
        }
    }

    // Expose refresh function
    window.refreshLeaderboard = function () {
        console.log("Manual refresh triggered");
        loadLeaderboard();
    };

    waitForFirebase();
</script>
