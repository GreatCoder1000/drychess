---
layout: default
title: Community
---

<div class="container">
    <h1>Community</h1>

    <div class="card">
        <h3>Players Leaderboard</h3>
        <div id="leaderboardContainer">
            <table class="table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Rating</th>
                        <th>Games</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td colspan="4" class="text-center">Loading players...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    let db;
    let getDocs, collection;

    // Wait for Firebase to be initialized
    async function waitForFirebase() {
        let attempts = 0;
        while (!window.db && attempts < 100) {
            await new Promise(resolve => setTimeout(resolve, 50));
            attempts++;
        }

        if (!window.db) {
            console.error("Firebase failed to initialize");
            return;
        }

        try {
            const firestoreModule = await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js");

            getDocs = firestoreModule.getDocs;
            collection = firestoreModule.collection;
            db = window.db;

            loadLeaderboard();
        } catch (error) {
            console.error("Error loading Firebase modules:", error);
        }
    }

    async function loadLeaderboard() {
        try {
            // Fetch all users (without orderBy to avoid index issues)
            const snapshot = await getDocs(collection(db, "users"));
            const tbody = document.getElementById("leaderboardBody");
            tbody.innerHTML = "";

            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">No players yet</td></tr>';
                return;
            }

            // Convert to array and sort by rating
            const players = [];
            snapshot.forEach(doc => {
                players.push({
                    nickname: doc.data().nickname || "Unknown",
                    rating: doc.data().rating || 1200,
                    games: doc.data().games || 0
                });
            });

            // Sort by rating descending
            players.sort((a, b) => b.rating - a.rating);

            // Display top 20
            let rank = 1;
            players.slice(0, 20).forEach(player => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${rank}</td>
                    <td>${player.nickname}</td>
                    <td><strong>${player.rating}</strong></td>
                    <td>${player.games}</td>
                `;
                tbody.appendChild(row);
                rank++;
            });
        } catch (err) {
            console.error("Error loading leaderboard:", err);
            document.getElementById("leaderboardBody").innerHTML =
                '<tr><td colspan="4" class="text-center text-danger">Error loading players</td></tr>';
        }
    }

    waitForFirebase();
</script>
