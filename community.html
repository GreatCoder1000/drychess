---
layout: default
title: Community
---

<div class="container">
    <h1>Community</h1>

    <div class="card">
        <h3>Players Leaderboard</h3>
        <div id="leaderboardContainer">
            <table class="table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Rating</th>
                        <th>Games</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td colspan="4" class="text-center">Loading players...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { getDocs, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    let db;

    // Wait for Firebase to be initialized
    async function waitForFirebase() {
        while (!window.db) {
            await new Promise(resolve => setTimeout(resolve, 100));
        }
        db = window.db;
        loadLeaderboard();
    }

    async function loadLeaderboard() {
        try {
            const q = query(
                collection(db, "users"),
                orderBy("rating", "desc"),
                limit(20)
            );

            const snapshot = await getDocs(q);
            const tbody = document.getElementById("leaderboardBody");
            tbody.innerHTML = "";

            let rank = 1;
            snapshot.forEach(doc => {
                const data = doc.data();
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${rank}</td>
                    <td>${data.nickname || "Unknown"}</td>
                    <td><strong>${data.rating || 1200}</strong></td>
                    <td>${data.games || 0}</td>
                `;
                tbody.appendChild(row);
                rank++;
            });

            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">No players yet</td></tr>';
            }
        } catch (err) {
            console.error("Error loading leaderboard:", err);
            document.getElementById("leaderboardBody").innerHTML =
                '<tr><td colspan="4" class="text-center text-danger">Error loading players</td></tr>';
        }
    }

    waitForFirebase();
</script>
