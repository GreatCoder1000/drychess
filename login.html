---
layout: default
title: Login
---

<div class="container" style="max-width: 400px; margin-top: 2rem;">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Email" class="form-control mb-2">
    <input id="password" type="password" placeholder="Password" class="form-control mb-3">

    <button id="loginBtn" class="btn btn-primary w-100 mb-2">Login</button>

    <p id="status" class="mt-3 text-danger"></p>
</div>

<script type="module">
    import { signInWithEmailAndPassword } 
        from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

    const auth = window.auth;

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const status = document.getElementById("status");
    const loginBtn = document.getElementById("loginBtn");

    loginBtn.onclick = async () => {
        status.textContent = "";

        try {
            await signInWithEmailAndPassword(
                auth,
                emailInput.value,
                passwordInput.value
            );

            // Redirect after successful login
            window.location.href = "/drychess/index.html";

        } catch (err) {
            status.textContent = err.message;
        }
    };
</script>
