---
layout: default
title: Login
---

<div class="container" style="max-width: 400px; margin-top: 2rem;">
    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h2>Login</h2>

        <input id="email" type="email" placeholder="Email" class="form-control mb-2">
        <input id="password" type="password" placeholder="Password" class="form-control mb-3">

        <button id="loginBtn" class="btn btn-primary w-100 mb-2">Login</button>

        <p class="text-center mt-2">
            Don't have an account? <a href="#" id="toggleRegister" style="cursor: pointer; color: var(--pumpkin);">Register</a>
        </p>

        <p id="loginStatus" class="mt-3 text-danger"></p>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display: none;">
        <h2>Register</h2>

        <input id="nickInput" type="text" placeholder="Nickname" class="form-control mb-2">
        <input id="regEmail" type="email" placeholder="Email" class="form-control mb-2">
        <input id="regPassword" type="password" placeholder="Password" class="form-control mb-2">
        <input id="regPassword2" type="password" placeholder="Confirm Password" class="form-control mb-3">

        <button id="registerBtn" class="btn btn-success w-100 mb-2">Register</button>

        <p class="text-center mt-2">
            Already have an account? <a href="#" id="toggleLogin" style="cursor: pointer; color: var(--pumpkin);">Login</a>
        </p>

        <p id="registerStatus" class="mt-3 text-danger"></p>
    </div>
</div>

<script type="module">
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword } 
        from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const auth = window.auth;
    const db = window.db;

    // Elements
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const toggleRegisterBtn = document.getElementById("toggleRegister");
    const toggleLoginBtn = document.getElementById("toggleLogin");

    // LOGIN
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginStatus = document.getElementById("loginStatus");
    const loginBtn = document.getElementById("loginBtn");

    // REGISTER
    const nickInput = document.getElementById("nickInput");
    const regEmail = document.getElementById("regEmail");
    const regPassword = document.getElementById("regPassword");
    const regPassword2 = document.getElementById("regPassword2");
    const registerStatus = document.getElementById("registerStatus");
    const registerBtn = document.getElementById("registerBtn");

    // Toggle between login and register
    toggleRegisterBtn.onclick = (e) => {
        e.preventDefault();
        loginForm.style.display = "none";
        registerForm.style.display = "block";
    };

    toggleLoginBtn.onclick = (e) => {
        e.preventDefault();
        registerForm.style.display = "none";
        loginForm.style.display = "block";
    };

    // Login handler
    loginBtn.onclick = async () => {
        loginStatus.textContent = "";

        try {
            await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
            window.location.href = "/drychess/index.html";
        } catch (err) {
            loginStatus.textContent = err.message;
        }
    };

    // Register handler
    registerBtn.onclick = async () => {
        registerStatus.textContent = "";

        // Validate
        if (!regEmail.value || !regPassword.value) {
            registerStatus.textContent = "Email and password required";
            return;
        }

        if (regPassword.value !== regPassword2.value) {
            registerStatus.textContent = "Passwords do not match";
            return;
        }

        if (regPassword.value.length < 6) {
            registerStatus.textContent = "Password must be at least 6 characters";
            return;
        }

        try {
            const cred = await createUserWithEmailAndPassword(auth, regEmail.value, regPassword.value);
            
            // Save nickname to Firestore
            await setDoc(doc(db, "users", cred.user.uid), {
                nickname: nickInput.value || regEmail.value,
                rating: 1200
            });

            window.location.href = "/drychess/index.html";
        } catch (err) {
            registerStatus.textContent = err.message;
        }
    };
</script>
