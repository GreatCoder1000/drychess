<div class="container" style="max-width: 400px; margin-top: 2rem;">
    <h2>Login</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<button id="signupBtn">Create Account</button>

<p id="status"></p>

    <!-- FIREBASE (MODULAR v12) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAA3Q_Mga_bP2Ef_4EfLTCABZ6XoXsJl68",
            authDomain: "drychess-ffad8.firebaseapp.com",
            projectId: "drychess-ffad8",
            storageBucket: "drychess-ffad8.firebasestorage.app",
            messagingSenderId: "749342832579",
            appId: "1:749342832579:web:f3cea2d3b38bc3c48d6f76"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Make auth available globally for login.html
        window.auth = auth;

        // Detect login state
        onAuthStateChanged(auth, user => {
            if (user) {
                console.log("Logged in as:", user.email);
            } else {
                console.log("Not logged in");
            }
        });

        // Logout function (optional)
        window.logout = () => signOut(auth);
    </script>

<script type="module">
    import { 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword 
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

    const auth = window.auth;

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const status = document.getElementById("status");

    document.getElementById("loginBtn").onclick = async () => {
        try {
            await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
            status.textContent = "Logged in!";
        } catch (err) {
            status.textContent = err.message;
        }
    };

    document.getElementById("signupBtn").onclick = async () => {
        try {
            await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
            status.textContent = "Account created!";
        } catch (err) {
            status.textContent = err.message;
        }
    };
</script>
