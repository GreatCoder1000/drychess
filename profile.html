---
layout: default
title: Player Profile
---

<div class="container" style="max-width: 600px;">
    <div id="profileContainer" style="display: none;">
        <div class="card">
            <h1 id="playerName"></h1>

            <div id="badgesContainer" style="margin-top: 1rem;">
                <!-- Badges will be added here -->
            </div>

            <div class="row mt-3">
                <div class="col-md-6">
                    <p><strong>Rating:</strong> <span id="playerRating" class="badge badge-info"></span></p>
                    <p><strong>Games Played:</strong> <span id="playerGames"></span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>Member ID:</strong> <code id="playerId" style="font-size: 0.8em;"></code></p>
                </div>
            </div>

            <hr>

            <h3>Bio</h3>
            <p id="playerBio" style="font-style: italic; color: #666;"></p>

            <!-- Edit Section (only for own profile) -->
            <div id="editSection"
                style="display: none; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #ddd;">
                <h3>Edit Profile</h3>

                <div class="form-group">
                    <label><strong>Bio</strong></label>
                    <textarea id="bioInput" class="form-control" rows="3" placeholder="Enter your bio..."></textarea>
                </div>

                <div class="form-group">
                    <label><strong>Flair</strong></label>
                    <select id="flairSelect" class="form-control">
                        <option value="0">None</option>
                        <option value="1">😀</option>
                        <option value="2">😇</option>
                        <option value="3">🎃</option>
                        <option value="4">😈</option>
                        <option value="5">💀</option>
                        <option value="6">🤣</option>
                    </select>
                </div>

                <button class="btn btn-success" onclick="saveBioAndFlair()">Save Changes</button>
                <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
                <p id="editStatus" class="mt-2 text-danger"></p>
            </div>

            <button id="editToggleBtn" class="btn btn-secondary mt-3" style="display: none;" onclick="toggleEdit()">Edit
                Profile</button>

            <hr>

            <button class="btn btn-primary" onclick="window.location.href='/drychess/community.html'">Back to
                Leaderboard</button>
        </div>
    </div>

    <div id="errorContainer" style="display: none;">
        <div class="card">
            <p class="text-danger"><strong>Error:</strong> <span id="errorMessage"></span></p>
            <button class="btn btn-primary" onclick="window.location.href='/drychess/community.html'">Back to
                Leaderboard</button>
        </div>
    </div>

    <div id="loadingContainer">
        <div class="card">
            <p>Loading profile...</p>
        </div>
    </div>
</div>

<script type="module">
    let db, getDoc, doc, updateDoc;
    let currentUserUid = null;
    let profileUid = null;
    const FLAIR_EMOJIS = [
        "",
        "😀",
        "😇",
        "🎃",
        "😈",
        "💀",
        "🤣"
    ];

    // Wait for Firebase to be initialized
    async function waitForFirebase() {
        let attempts = 0;
        while ((!window.db || !window.auth) && attempts < 100) {
            await new Promise(resolve => setTimeout(resolve, 50));
            attempts++;
        }

        if (!window.db || !window.auth) {
            console.error("Firebase failed to initialize");
            showError("Firebase not initialized");
            return;
        }

        try {
            const firestoreModule = await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js");

            getDoc = firestoreModule.getDoc;
            doc = firestoreModule.doc;
            updateDoc = firestoreModule.updateDoc;
            db = window.db;

            // Get current user
            currentUserUid = window.auth.currentUser?.uid;

            loadProfile();
        } catch (error) {
            console.error("Error loading Firebase modules:", error);
            showError("Could not load Firebase");
        }
    }

    function showError(message) {
        document.getElementById("loadingContainer").style.display = "none";
        document.getElementById("profileContainer").style.display = "none";
        document.getElementById("errorContainer").style.display = "block";
        document.getElementById("errorMessage").textContent = message;
    }

    function toggleEdit() {
        const editSection = document.getElementById("editSection");
        editSection.style.display = editSection.style.display === "none" ? "block" : "none";
    }

    function cancelEdit() {
        document.getElementById("editSection").style.display = "none";
    }

    async function saveBioAndFlair() {
        try {
            const bioInput = document.getElementById("bioInput").value;
            const flairSelect = parseInt(document.getElementById("flairSelect").value);
            const editStatus = document.getElementById("editStatus");

            editStatus.textContent = "Saving...";

            // Update Firestore
            await updateDoc(doc(db, "users", profileUid), {
                bio: bioInput,
                flairId: flairSelect
            });

            editStatus.textContent = "";
            cancelEdit();

            // Reload profile to show changes
            loadProfile();
        } catch (err) {
            console.error("Error saving profile:", err);
            document.getElementById("editStatus").textContent = "Error: " + err.message;
        }
    }

    // Expose functions for onclick
    window.toggleEdit = toggleEdit;
    window.cancelEdit = cancelEdit;
    window.saveBioAndFlair = saveBioAndFlair;

    async function loadProfile() {
        try {
            // Get uid from URL parameters
            const params = new URLSearchParams(window.location.search);
            profileUid = params.get("uid");

            if (!profileUid) {
                showError("No user ID provided. Use ?uid=USER_ID");
                return;
            }

            console.log("Loading profile for UID:", profileUid);
            console.log("Current user UID:", currentUserUid);

            // Fetch user document
            const userDoc = await getDoc(doc(db, "users", profileUid));

            if (!userDoc.exists()) {
                showError("Player not found");
                return;
            }

            const data = userDoc.data();
            console.log("User data:", data);

            // Display profile
            document.getElementById("loadingContainer").style.display = "none";
            document.getElementById("errorContainer").style.display = "none";
            document.getElementById("profileContainer").style.display = "block";

            const flairEmoji = FLAIR_EMOJIS[data.flairId] || "";
            document.getElementById("playerName").textContent = (data.nickname || "Unknown Player") + (flairEmoji ? " " + flairEmoji : "");

            // Display badges
            const badgesContainer = document.getElementById("badgesContainer");
            badgesContainer.innerHTML = "";

            if (data.isPlusMember) {
                const plusBadge = document.createElement("span");
                plusBadge.className = "badge badge-warning";
                plusBadge.style.fontSize = "1.2em";
                plusBadge.style.marginRight = "0.5rem";
                plusBadge.textContent = "⭐ Plus Member";
                badgesContainer.appendChild(plusBadge);
            }

            document.getElementById("playerRating").textContent = data.rating || 1200;
            document.getElementById("playerGames").textContent = data.games || 0;
            document.getElementById("playerId").textContent = profileUid;
            document.getElementById("playerBio").textContent = data.bio || "No bio added yet.";

            // Show edit button if this is the user's own profile
            const editToggleBtn = document.getElementById("editToggleBtn");
            const editSection = document.getElementById("editSection");

            if (currentUserUid === profileUid) {
                editToggleBtn.style.display = "block";
                editSection.style.display = "none";

                // Pre-populate edit fields
                document.getElementById("bioInput").value = data.bio || "";
                document.getElementById("flairSelect").value = data.flairId || "0";
            } else {
                editToggleBtn.style.display = "none";
                editSection.style.display = "none";
            }

        } catch (err) {
            console.error("Error loading profile:", err);
            showError(err.message);
        }
    }

    // Start initialization
    waitForFirebase();
</script>
