---
layout: default
title: Play vs Computer
---

<div class="container" style="max-width: 900px;">
    <h1>Player vs Computer</h1>

    <!-- Bot Selection -->
    <div id="botSelectionScreen" style="display: block;">
        <h3>Choose Your Opponent</h3>
        <div id="botList" class="row"></div>
    </div>

    <!-- Game Board -->
    <div id="gameScreen" style="display: none;">
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <h3>Game vs <span id="currentBotName"></span></h3>
                    <p>Bot Rating: <span id="currentBotRating" class="badge badge-info"></span></p>
                    <p>Your Rating: <span id="userRating" class="badge badge-info"></span></p>

                    <div style="margin-top: 1rem;">
                        <div id="board" style="width: 400px;"></div>
                    </div>

                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <h3>Game Info</h3>
                    <p><strong>Opponent:</strong> <span id="gameBotName"></span></p>
                    <p><strong>Bot Level:</strong> <span id="gameBotLevel"></span></p>
                    <p><strong>Bot Rating:</strong> <span id="gameBotRating"></span></p>
                    <button class="btn btn-danger w-100" onclick="backToSelection()">Cancel Game</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Chess libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboardjs/1.0.0/chessboard.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboardjs/1.0.0/chessboard.min.css">

<script type="module">
    /* -------------------------
       CHESS GAME LOGIC
    ------------------------- */

    let game = null;
    let board = null;

    function startGame() {
        game = new Chess();

        board = window.Chessboard('board', {
            draggable: true,
            position: 'start',
            onDrop: onPlayerMove
        });
    }

    function botMove() {
        const moves = game.moves();
        if (moves.length === 0) return;

        const move = moves[Math.floor(Math.random() * moves.length)];
        game.move(move);

        board.position(game.fen(), true);
    }

    function onPlayerMove(source, target) {
        const move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        });

        if (move === null) return 'snapback';

        setTimeout(botMove, 300);
    }

    /* -------------------------
       FIREBASE + UI LOGIC
    ------------------------- */

    let db, auth;
    let getDoc, doc;

    const botDatabase = [
        { id: "bot-rookie", name: "Rookiebomb", level: 1, rating: 400, description: "Perfect for beginners" },
        { id: "bot-pawn", name: "Pawn Pusher", level: 2, rating: 600, description: "A simple opponent" },
        { id: "bot-knight", name: "Knight Rider", level: 3, rating: 800, description: "Challenging play" }
    ];

    let userRating = 1200;
    let selectedBot = null;

    async function waitForFirebase() {
        let attempts = 0;
        while ((!window.auth || !window.db) && attempts < 100) {
            await new Promise(r => setTimeout(r, 50));
            attempts++;
        }

        if (!window.auth || !window.db) {
            console.error("Firebase failed to initialize");
            return;
        }

        try {
            const firestoreModule = await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js");

            getDoc = firestoreModule.getDoc;
            doc = firestoreModule.doc;
            db = window.db;
            auth = window.auth;

            initializeApp();
        } catch (error) {
            console.error("Error loading Firebase modules:", error);
        }
    }

    async function loadUserRating() {
        try {
            const user = auth.currentUser;
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().rating) {
                    userRating = userDoc.data().rating;
                    document.getElementById("userRating").textContent = userRating;
                }
            }
        } catch (err) {
            console.log("Could not load user rating:", err);
        }
    }

    function displayBots() {
        const botList = document.getElementById("botList");
        botList.innerHTML = "";

        botDatabase.forEach(bot => {
            const card = document.createElement("div");
            card.className = "col-md-6 mb-3";
            card.innerHTML = `
                <div class="card" style="cursor: pointer;" onclick="selectBot('${bot.id}')">
                    <h4>${bot.name}</h4>
                    <p>${bot.description}</p>
                    <p><strong>Level:</strong> ${bot.level}</p>
                    <p><strong>Rating:</strong> <span class="badge badge-info">${bot.rating}</span></p>
                    <button class="btn btn-primary w-100">Challenge</button>
                </div>
            `;
            botList.appendChild(card);
        });
    }

    window.selectBot = function (botId) {
        selectedBot = botDatabase.find(b => b.id === botId);
        if (selectedBot) showGameScreen();
    };

    function showGameScreen() {
        document.getElementById("botSelectionScreen").style.display = "none";
        document.getElementById("gameScreen").style.display = "block";

        document.getElementById("currentBotName").textContent = selectedBot.name;
        document.getElementById("currentBotRating").textContent = selectedBot.rating;
        document.getElementById("gameBotName").textContent = selectedBot.name;
        document.getElementById("gameBotLevel").textContent = selectedBot.level;
        document.getElementById("gameBotRating").textContent = selectedBot.rating;

        startGame();
    }

    window.backToSelection = function () {
        selectedBot = null;
        document.getElementById("botSelectionScreen").style.display = "block";
        document.getElementById("gameScreen").style.display = "none";
    };

    function checkUrlParameters() {
        const params = new URLSearchParams(window.location.search);
        const botParam = params.get("bot");

        if (botParam) {
            const bot = botDatabase.find(b => b.id === botParam);
            if (bot) {
                selectedBot = bot;
                showGameScreen();
            }
        }
    }

    async function initializeApp() {
        await loadUserRating();
        displayBots();
        checkUrlParameters();
    }

    waitForFirebase();
</script>
